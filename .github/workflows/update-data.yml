name: Update Stock Data

on:
  workflow_dispatch:
  schedule:
    # 04:30 Asia/Taipei = 20:30 UTC on the previous day
    - cron: "30 20 * * *"

permissions:
  contents: write

concurrency:
  group: stock-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Taipei
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: data/package-lock.json

      - name: Install Wrangler dependencies
        working-directory: data
        run: npm ci

      - name: Validate required secrets
        run: |
          test -n "${CLOUDFLARE_ACCOUNT_ID}"
          test -n "${CLOUDFLARE_API_TOKEN}"
          test -n "${CLOUDFLARE_KV_NAMESPACE_ID}"

      - name: Refresh data and upload to Cloudflare KV
        run: bash ./upload2KV.sh

      - name: Commit updated data files
        run: |
          if [[ -z "$(git status --porcelain -- data)" ]]; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "chore: update stock data"
          git push
